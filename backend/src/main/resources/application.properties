# ==========================================
# APPLICATION
# ==========================================
spring.application.name=petcare
server.port=8080

# ==========================================
# MYSQL DATABASE
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# RAZORPAY
# ==========================================
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}
payment.mock.enabled=true

# ==========================================
# EMAIL CONFIGURATION
# ==========================================
notifications.enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_USERNAME}

app.mail.from-name=Smart Pet Care

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.smtp.connectiontimeout=5000
spring.mail.smtp.timeout=5000
spring.mail.smtp.writetimeout=5000

# ==========================================
# FRONTEND URL
# ==========================================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# ASYNC CONFIGURATION
# ==========================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==========================================
# OPENROUTER API
# ==========================================
openrouter.api.key=${OPENROUTER_API_KEY}